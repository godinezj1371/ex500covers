<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>EX500 Cover Removal Training</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #message {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 5px;
      font-family: Arial, sans-serif;
    }
    #noteBox {
      position: absolute;

      top: 60px;
      left: 10px;

      width: 350px;

      background: white;

      padding: 10px;

      border-radius: 5px;

      font-family: Arial, sans-serif;

      font-size: 14px;

      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
    #victoryMessage {
      position: absolute;

      top: 50%;
      left: 50%;

      transform: translate(-50%, -50%);

      background: rgba(255,255,255,0.95);

      width: fit-content;
      min-width: 300px;

      padding: 30px 50px;

      font-size: 36px;
      font-weight: bold;

      border-radius: 10px;

      opacity: 0;

      pointer-events: none;

      transition: opacity 0.5s ease;
    }

    #victoryMessage.show {

    opacity: 1;

    animation: bounce 0.6s ease;
    }

    @keyframes bounce {

    0% {
      transform:
        translate(-50%, -50%)
        scale(0.5);
    }

    60% {
      transform:
        translate(-50%, -50%)
        scale(1.15);
    }

    100% {
      transform:
        translate(-50%, -50%)
        scale(1);
    }
    }
    #resetButton {
      position: absolute;
      top: 10px;
      right: 10px;

      padding: 10px 20px;

      background: #1976d2;
      color: white;

      border: none;
      border-radius: 5px;

      cursor: pointer;
    }

    #resetButton:hover {
      background: #1565c0;
    }
  </style>
</head>

<body>

<div id="message">
  Select a cover
</div>

<div id="noteBox">
  Extra considerations will appear here.
</div>

<button id="resetButton">
  Reset
</button>

<div id="victoryMessage">
  Good job!
</div>

<script type="module" src="/src/main.js"></script>

</body>
</html>
